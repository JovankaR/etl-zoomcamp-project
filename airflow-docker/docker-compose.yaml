version: '3.8'

x-airflow-common:
  &airflow-common
  # Use custom Dockerfile instead of default image
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKEND: airflow.api.auth.backend.basic_auth
    # ENV variable points to container path where we mount the Google credentials JSON
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/google_credentials.json
    
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    # Mount Google credentials
    - ${GOOGLE_CREDENTIALS_PATH}:/opt/airflow/secrets/google_credentials.json:ro
    # Mount scripts folder
    - ./scripts:/opt/airflow/scripts:ro
    - ./spark_jobs:/opt/airflow/spark_jobs:ro
    

  user: "${AIRFLOW_UID:-50000}:0"

  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  redis:
    image: redis:latest
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    env_file:
      - .env 

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    env_file:
      - .env 

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: always
    env_file:
      - .env

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/google_credentials.json
    volumes:
      - metabase-data:/metabase-data 
      - ${GOOGLE_CREDENTIALS_PATH}:/opt/airflow/secrets/google_credentials.json:ro
    restart: always

volumes:
  postgres-db-volume:
  metabase-data: